version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: officebilling_app
    container_name: officebilling_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./vendor:/var/www/vendor
      - ./storage:/var/www/storage
    environment:
      APP_ENV: local
      APP_DEBUG: '1'
      DB_HOST: db
      DB_DATABASE: officebilling
      DB_USERNAME: root
      DB_PASSWORD: secret
    networks:
      - officebilling_net

  web:
    image: nginx:alpine
    container_name: officebilling_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - officebilling_net

  db:
    image: mysql:8.0
    container_name: officebilling_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: officebilling
      MYSQL_USER: user
      MYSQL_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - officebilling_net

volumes:
  dbdata:

networks:
  officebilling_net:
    driver: bridge
